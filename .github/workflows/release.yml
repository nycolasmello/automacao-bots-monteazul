name: Build & Release

on:
  push:
    tags:
      - 'v*'   # Dispara apenas quando você faz: git tag v2.1.0 && git push --tags

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # necessário para criar o GitHub Release

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Build do executável
        run: pyinstaller add_carro_gui.spec

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MonteAzul-Automation.exe
          generate_release_notes: true   # gera changelog automático com os commits
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
